services:
  # OmniSwarm Python worker (FFmpeg + Demucs + Gemini pipeline).
  # The Next.js frontend deploys separately on Vercel; this worker shares the
  # same Aurora DSQL cluster and Amazon S3 buckets.
  - type: web
    name: omniswarm-worker
    env: python
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "export PATH=/opt/render/project/src/bin:$PATH && uvicorn src.webhook:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: S3_LIVE_MODE
        value: "True"
      - key: GEMINI_LIVE_MODE
        value: "True"
      - key: APP_AWS_REGION
        value: us-east-1
      - key: TARGET_MARKETS
        value: "japan,germany,india,english"
      # Set securely in the Render dashboard:
      - key: APP_AWS_ACCESS_KEY_ID
        sync: false
      - key: APP_AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DSQL_ENDPOINT
        sync: false
      - key: S3_MASTER_BUCKET
        sync: false
      - key: S3_OUTPUT_BUCKET
        sync: false
      - key: WORKER_AUTH_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
